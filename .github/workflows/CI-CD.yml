name: FreeStyle Final Project CI-CD

on:
  #push:
    #branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'Prod'
        type: choice
        options:
          - Prod

env:
  AWS_REGION: "eu-west-1"
  ECR_REPOSITORY: "freestyle"
  APP_NAME: "freestyle-api"
  EKS_CLUSTER_NAME: "Freestyle"
  EKS_NAMESPACE: ${{ secrets.EKS_NAMESPACE || 'freestyle' }}
  #SPLUNK_URL: ${{ secrets.SPLUNK_URL }}
  #SPLUNK_TOKEN: ${{ secrets.SPLUNK_TOKEN }}
  #SPLUNK_INDEX: ${{ secrets.SPLUNK_INDEX }}
  #ENVIRONMENT: splunk

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: ENV
    name: "🎯 Build Image on runner"

    services:
      mongo:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    outputs:
      image_tag: ${{ steps.generate-tag.outputs.UNIQUE_TAG }}
      ecr_registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - name: Checkout repository 📂
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Configure AWS credentials 🔐
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::017923816312:role/GithubActionsAvivLevyDeployRole

      - name: Login to Amazon ECR 🔑
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create .env file from secrets
        run: |
          echo "🔧 Creating environment file..."
          echo "${{ secrets.AWS_PRODUCTION }}" > .env
          echo "✅ Environment file created successfully!"

      - name: Wait for Mongo to be ready ⏱️
        run: |
          MAX_RETRIES=10
          RETRY_INTERVAL=2
          echo "⏳ Waiting for MongoDB service..."

          for i in $(seq 1 $MAX_RETRIES); do
            if nc -z localhost 27017; then
              echo "✅ MongoDB port is open!"
              break
            fi
            echo "Waiting for MongoDB..."
            sleep $RETRY_INTERVAL
            if [ "$i" -eq "$MAX_RETRIES" ]; then
              echo "❌ MongoDB failed to start"
              exit 1
            fi
            done

      - name: Start app in background 🚀
        run: |
          node server.js &
          sleep 2

      - name: Wait for app to be ready ⏱️
        run: |
          for i in {1..15}; do
            if curl -s http://localhost:4500/test >/dev/null 2>&1; then
              echo "✅ App is ready!"
              exit 0
            fi
            echo "⏳ Waiting for app..."
            sleep 2
          done
          echo "❌ App failed to start"
          exit 1

      - name: Initialize local DB 🚀
        run: |
          curl http://localhost:4500/initialize
          sleep 1

          
      - name: Run login API tests 📝
        run: |
          localUrl="http://localhost:4500/login"

          echo "** Test 1: Correct login **"
          response=$(curl -s -X POST $localUrl \
          -H "Content-Type: application/json" \
          -d "${{ secrets.MONGO_TEST_USER }}")
          if echo "$response" | jq empty 2>/dev/null; then
            token=$(echo "$response" | jq -r ".token")
            if [ "$token" != "null" ] && [ -n "$token" ]; then
              echo "Ok: User successfully logged-in"
            else
              error_msg=$(echo "$response" | jq -r '.message // empty')
              if [ -n "$error_msg" ]; then
                echo "Fail: $error_msg"
                exit 1
              else
                echo "Fail: unexpected response"
                exit 1
              fi
            fi
          else
            echo "Fail: $response"
            exit 1
          fi

          echo "** Test 2: Wrong login **"
          response=$(curl -s -X POST $localUrl \
          -H "Content-Type: application/json" \
          -d '{"email": "wrong@gmail.com", "password": "Abc@12345"}')
          if echo "$response" | jq empty 2>/dev/null; then
            token=$(echo "$response" | jq -r ".token")
            if [ "$token" != "null" ] && [ -n "$token" ]; then
              echo "Fail: Wrong login have a token"
              exit 1
            else
              echo "Ok: $(echo "$response" | jq -r '.message // "unexpected response"')"
            fi
          else
            echo "Ok: $response"
          fi

          echo "** Test 3: Wrong Password **"
          response=$(curl -s -X POST $localUrl \
          -H "Content-Type: application/json" \
          -d '{"email": "nir@gmail.com", "password": "Abc@12345"}')
          if echo "$response" | jq empty 2>/dev/null; then
            token=$(echo "$response" | jq -r ".token")
            if [ "$token" != "null" ] && [ -n "$token" ]; then
              echo "Fail: Wrong password have a token"
              exit 1
            else
              echo "Ok: $(echo "$response" | jq -r '.message // "unexpected response"')"
            fi
          else
            echo "Ok: $response"
          fi

      - name: Generate Tag
        id: generate-tag
        run: |
          BUILD_NUMBER=${{ github.run_number }}
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          echo "UNIQUE_TAG=${{ env.APP_NAME }}-${BUILD_NUMBER}-${TIMESTAMP}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image 🏗️
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          UNIQUE_TAG: ${{ steps.generate-tag.outputs.UNIQUE_TAG }}

      
        run: |
          echo "🔨 Starting Docker build..."
          echo "🔍 Build triggered by: ${{ github.event_name }}"
          docker build -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$UNIQUE_TAG .
          echo "⬆️ Pushing image to ECR..."
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$UNIQUE_TAG
          echo "✅ Image pushed successfully with tag: $UNIQUE_TAG"

# Deploy image to eks
  Deploy-to-eks:
    runs-on: ubuntu-latest
    name: "🎯 Deploy image to eks"
    needs: build-and-push

    steps:
      - name: Configure AWS credentials 🔐
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::017923816312:role/GithubActionsAvivLevyDeployRole

      - name: Setup kubectl & auth to EKS 🧩
        run: |
          aws eks update-kubeconfig --name "$EKS_CLUSTER_NAME" --region "$AWS_REGION"
          kubectl version --client=true

      - name: Ensure namespace exists 🧱
        run: |
          kubectl get ns "$EKS_NAMESPACE" >/dev/null 2>&1 || kubectl create ns "$EKS_NAMESPACE"

# Deployment file configuration
      - name: Render Kubernetes manifests 📄
        env:
          IMAGE: ${{ needs.build-and-push.outputs.ecr_registry }}/${{ env.ECR_REPOSITORY }}:${{ needs.build-and-push.outputs.image_tag }}
        run: |
          cat > k8s.yaml <<EOF
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: ${APP_NAME}
            namespace: ${EKS_NAMESPACE}
            labels:
              app: ${APP_NAME}
          spec:
            replicas: 2
            selector:
              matchLabels:
                app: ${APP_NAME}
            template:
              metadata:
                labels:
                  app: ${APP_NAME}
              spec:
                containers:
                  - name: ${APP_NAME}
                    image: ${IMAGE}
                    imagePullPolicy: Always
                    ports:
                      - containerPort: 4500
                    resources:
                      requests:
                        cpu: "100m"
                        memory: "128Mi"
                      limits:
                        cpu: "500m"
                        memory: "512Mi"
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: ${APP_NAME}
            namespace: ${EKS_NAMESPACE}
            labels:
              app: ${APP_NAME}
          spec:
            type: LoadBalancer
            selector:
              app: ${APP_NAME}
            ports:
              - name: http
                port: 80
                targetPort: 4500
          EOF


# apply the deploy
      - name: Apply manifests 🚀
        run: |
          kubectl apply -f k8s.yaml

      - name: Wait for rollout ⏱️
        run: |
          kubectl rollout status deploy/${APP_NAME} -n ${EKS_NAMESPACE} --timeout=300s
          echo "Deployed image:"
          echo "${{ needs.build-and-push.outputs.ecr_registry }}/${{ env.ECR_REPOSITORY }}:${{ needs.build-and-push.outputs.image_tag }}"

      - name: Show service endpoint 🌐
        run: |
          kubectl get svc ${APP_NAME} -n ${EKS_NAMESPACE} -o wide
          echo -n "LB hostname: "
          kubectl get svc ${APP_NAME} -n ${EKS_NAMESPACE} -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' || true
          echo

      - name: Diagnostics on failure 🧪
        if: failure()
        run: |
            echo "=== Pods ==="
            kubectl get pods -n ${EKS_NAMESPACE} -o wide
            echo "=== Describe deployment ==="
            kubectl describe deploy/${APP_NAME} -n ${EKS_NAMESPACE} || true
            echo "=== Events ==="
            kubectl get events -n ${EKS_NAMESPACE} --sort-by=.lastTimestamp | tail -n 100 || true
            echo "=== Pod logs (first pod) ==="
            P=$(kubectl get pods -n ${EKS_NAMESPACE} -l app=${APP_NAME} -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
            if [ -n "$P" ]; then kubectl logs -n ${EKS_NAMESPACE} "$P" --tail=200 || true; fi

            
  test-lb:
    runs-on: ubuntu-latest
    name: "Check if LB is ready"
    needs: Deploy-to-eks
    steps:
      - name: Wait for service to be ready ⏱️
        run: |
          # Wait for LoadBalancer hostname to appear
          for i in {1..15}; do
            LB=$(kubectl get svc ${APP_NAME} -n ${EKS_NAMESPACE} -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
            if [ -n "$LB" ]; then break; fi
            echo "Waiting for LoadBalancer..."
            sleep 10
          done
          if [ -z "$LB" ]; then
            echo "Fail: LoadBalancer hostname not available"
            exit 1
          fi
          echo "Service available at: $LB"
        
